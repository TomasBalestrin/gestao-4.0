<!DOCTYPE html>
<html lang="pt-BR" class="">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simulador — Gestão 4.0</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/lucide@latest"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: {
      colors: {
        border: 'hsl(var(--border))',
        input: 'hsl(var(--input))',
        ring: 'hsl(var(--ring))',
        background: 'hsl(var(--background))',
        foreground: 'hsl(var(--foreground))',
        primary: { DEFAULT: 'hsl(var(--primary))', foreground: 'hsl(var(--primary-foreground))' },
        secondary: { DEFAULT: 'hsl(var(--secondary))', foreground: 'hsl(var(--secondary-foreground))' },
        muted: { DEFAULT: 'hsl(var(--muted))', foreground: 'hsl(var(--muted-foreground))' },
        accent: { DEFAULT: 'hsl(var(--accent))', foreground: 'hsl(var(--accent-foreground))' },
        destructive: { DEFAULT: 'hsl(var(--destructive))', foreground: 'hsl(var(--destructive-foreground))' },
        success: { DEFAULT: 'hsl(var(--success))', foreground: 'hsl(var(--success-foreground))' },
        card: { DEFAULT: 'hsl(var(--card))', foreground: 'hsl(var(--card-foreground))' },
        popover: { DEFAULT: 'hsl(var(--popover))', foreground: 'hsl(var(--popover-foreground))' },
      },
      fontFamily: { sans: ['Inter','-apple-system','BlinkMacSystemFont','SF Pro Text','system-ui','sans-serif'] },
      borderRadius: { lg: 'var(--radius)', md: 'calc(var(--radius) - 2px)', sm: 'calc(var(--radius) - 4px)' },
    }}
  }
</script>
<style>
  :root {
    --background: 240 17% 96%; --foreground: 0 0% 0%;
    --card: 0 0% 100%; --card-foreground: 0 0% 0%;
    --popover: 0 0% 100%; --popover-foreground: 0 0% 0%;
    --primary: 211 100% 50%; --primary-foreground: 0 0% 100%;
    --secondary: 240 6% 90%; --secondary-foreground: 0 0% 0%;
    --muted: 240 6% 90%; --muted-foreground: 240 4% 46%;
    --accent: 211 100% 50%; --accent-foreground: 0 0% 100%;
    --destructive: 4 100% 59%; --destructive-foreground: 0 0% 100%;
    --success: 135 59% 49%; --success-foreground: 0 0% 100%;
    --border: 240 6% 87%; --input: 240 6% 87%; --ring: 211 100% 50%;
    --radius: 0.625rem;
  }
  .dark {
    --background: 0 0% 0%; --foreground: 0 0% 100%;
    --card: 240 5% 11%; --card-foreground: 0 0% 100%;
    --popover: 240 5% 11%; --popover-foreground: 0 0% 100%;
    --primary: 212 100% 53%; --secondary: 240 4% 16%; --muted: 240 4% 16%;
    --muted-foreground: 240 3% 64%; --accent: 212 100% 53%;
    --destructive: 3 100% 64%; --success: 135 80% 51%;
    --border: 240 4% 22%; --input: 240 4% 22%; --ring: 212 100% 53%;
  }
  body { font-family: 'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif; letter-spacing:-0.005em; -webkit-font-smoothing:antialiased; }
  .brand-mark { background: linear-gradient(135deg, hsl(211 100% 50%) 0%, hsl(241 56% 59%) 100%); border-radius:22%; box-shadow: inset 0 0 0 0.5px hsl(0 0% 0% / 0.06), 0 1px 1px hsl(0 0% 0% / 0.08); display:inline-flex; align-items:center; justify-content:center; color:white; font-weight:700; }
  @keyframes ringPulse { 0%,100% { box-shadow: 0 0 0 0 currentColor; } 50% { box-shadow: 0 0 0 4px transparent; } }
  .dot-pulse { animation: ringPulse 2s infinite; }
  .scrollbar-thin::-webkit-scrollbar { width:6px; height:6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius:3px; }
  .nav-link { display:flex; gap:.5rem; align-items:center; padding:.5rem .75rem; border-radius:var(--radius); font-size:13px; color:hsl(var(--muted-foreground)); cursor:pointer; }
  .nav-link:hover { background:hsl(var(--secondary)); color:hsl(var(--foreground)); }
  .nav-link.active { background:hsl(var(--secondary)); color:hsl(var(--foreground)); font-weight:600; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; border-radius:var(--radius); font-size:14px; font-weight:600; transition: all 200ms; height:2.5rem; padding-left:1rem; padding-right:1rem; cursor:pointer; }
  .btn-primary { background:hsl(var(--primary)); color:hsl(var(--primary-foreground)); }
  .btn-primary:hover { opacity:.9; }
  .btn-outline { border:1px solid hsl(var(--input)); background:hsl(var(--background)); color:hsl(var(--foreground)); }
  .btn-outline:hover { background:hsl(var(--secondary)); }
  .btn-ghost { background:transparent; color:hsl(var(--foreground)); }
  .btn-ghost:hover { background:hsl(var(--secondary)); }
  .btn-destructive { background:hsl(var(--destructive)); color:hsl(var(--destructive-foreground)); }
  .btn-sm { height:2.25rem; padding-left:.75rem; padding-right:.75rem; }
  .input-base { display:flex; height:2.5rem; width:100%; border-radius:var(--radius); border:1px solid hsl(var(--input)); background:hsl(var(--background)); padding:0 .75rem; font-size:14px; }
  .input-base:focus { outline:none; box-shadow: 0 0 0 2px hsl(var(--ring)); }
  .badge { display:inline-flex; align-items:center; border-radius:9999px; padding:1px 10px; font-size:12px; font-weight:600; }
</style>
</head>

</div>

function statusBadgeCall(s){
  if (s==='agendada') return '<span class="badge bg-primary/10 text-primary">Agendada</span>';
  if (s==='realizada') return '<span class="badge bg-success/10 text-success">Realizada</span>';
  if (s==='no_show') return '<span class="badge bg-destructive/10 text-destructive">No-show</span>';
  return '<span class="badge bg-secondary">Cancelada</span>';
}
function eventColor(s){
  if (s==='realizada') return 'bg-success/15 text-success';
  if (s==='no_show') return 'bg-destructive/15 text-destructive';
  return 'bg-primary/15 text-primary';
}

// ===== ROUTER =====
const routes = {};
function route(path, fn){ routes[path] = fn; }
function go(path){ location.hash = '#' + path; }
function currentPath(){ return location.hash.slice(1) || '/crm'; }
function render(){
  const path = currentPath();
  const view = document.getElementById('view');
  view.innerHTML = '';
  // match dynamic
  for (const r in routes) {
    const re = new RegExp('^'+r.replace(/:\w+/g,'([^/]+)')+'$');
    const m = path.match(re);
    if (m) {
      routes[r](view, ...m.slice(1));
      updateSidebar(path);
      if (window.lucide) window.lucide.createIcons();
      view.scrollTop = 0;
      return;
    }
  }
  view.innerHTML = '<div class="p-8 text-sm text-muted-foreground">Página não encontrada</div>';
}
function updateSidebar(path){
  document.querySelectorAll('#navMain .nav-link').forEach(el => {
    const r = el.dataset.route;
    el.classList.toggle('active', path === r || (r === '/crm' && path.startsWith('/crm')));
  });
}
window.addEventListener('hashchange', render);

// ===== TOAST =====
function toast(msg, icon='check-circle-2', tone='success'){
  const tones = { success:'text-success', destructive:'text-destructive', primary:'text-primary' };
  const root = document.getElementById('toastRoot');
  const el = document.createElement('div');
  el.className = 'flex items-start gap-3 rounded-md border border-border bg-card p-3 shadow-md max-w-sm';
  el.innerHTML = `<i data-lucide="${icon}" class="h-4 w-4 ${tones[tone]||''} mt-0.5"></i><div class="flex-1 text-sm font-medium">${msg}</div>`;
  root.appendChild(el);
  if (window.lucide) window.lucide.createIcons();
  setTimeout(()=>el.remove(), 3000);
}

// ===== MODAL =====
function openModal(html){
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
    <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
      <div class="absolute inset-0 bg-black/50" onclick="closeModal()"></div>
      <div class="relative w-full max-w-2xl rounded-lg border border-border bg-card p-6 shadow-lg max-h-[90vh] overflow-y-auto">
        <button onclick="closeModal()" class="absolute right-4 top-4 text-muted-foreground hover:text-foreground"><i data-lucide="x" class="h-4 w-4"></i></button>
        ${html}
      </div>
    </div>`;
  if (window.lucide) window.lucide.createIcons();
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

function openSheet(html){
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
    <div class="fixed inset-0 z-50">
      <div class="absolute inset-0 bg-black/40" onclick="closeModal()"></div>
      <div class="absolute right-0 top-0 h-full w-full max-w-md bg-card border-l border-border shadow-lg flex flex-col">${html}</div>
    </div>`;
  if (window.lucide) window.lucide.createIcons();
}

// ===== Notificações dropdown =====
function renderNotifs(){
  const list = document.getElementById('notifList');
  list.innerHTML = SEED.notificacoes.map(n => `
    <div class="flex w-full items-start gap-2 px-3 py-2 hover:bg-secondary cursor-pointer" onclick="closeBell(); go('${n.link}')">
      <span class="mt-1.5 h-1.5 w-1.5 rounded-full ${n.lida?'bg-transparent':'bg-foreground'}"></span>
      <div class="min-w-0 flex-1">
        <div class="text-sm ${n.lida?'text-muted-foreground':'font-medium'} leading-tight">${n.titulo}</div>
        ${n.descricao?`<div class="text-xs text-muted-foreground truncate">${n.descricao}</div>`:''}
        <div class="text-[10px] text-muted-foreground/70 mt-0.5">${n.quando}</div>
      </div>
    </div>`).join('');
  const unread = SEED.notificacoes.filter(n=>!n.lida).length;
  const badge = document.getElementById('bellBadge');
  if (unread === 0) badge.classList.add('hidden'); else { badge.classList.remove('hidden'); badge.textContent = unread; }
}
function markAllRead(){ SEED.notificacoes.forEach(n => n.lida = true); renderNotifs(); }
function closeBell(){ document.getElementById('bellPanel').classList.add('hidden'); }

// ===== HEADER actions =====
document.getElementById('themeToggle').addEventListener('click', () => {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('sim-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
  if (window.lucide) window.lucide.createIcons();
});
if (localStorage.getItem('sim-theme') === 'dark') document.documentElement.classList.add('dark');

document.getElementById('bellBtn').addEventListener('click', e => { e.stopPropagation(); document.getElementById('bellPanel').classList.toggle('hidden'); document.getElementById('userPanel').classList.add('hidden'); });
document.getElementById('userBtn').addEventListener('click', e => { e.stopPropagation(); document.getElementById('userPanel').classList.toggle('hidden'); document.getElementById('bellPanel').classList.add('hidden'); });
document.addEventListener('click', () => { document.getElementById('bellPanel').classList.add('hidden'); document.getElementById('userPanel').classList.add('hidden'); });

function setTopbar(title, subtitle){
  document.getElementById('topbarTitle').innerHTML = `<span class="text-foreground font-semibold">${title}</span>${subtitle?` <span class="text-muted-foreground"> · ${subtitle}</span>`:''}`;
}

      </div>
    </div>`;

}
function rgbToHex(hsl){
  // brain-dead conversion since we're just rendering color pickers — use approx
  if (hsl.includes('211')) return '007AFF';
  if (hsl.includes('135')) return '34C759';
  if (hsl.includes('282')) return 'AF52DE';
  if (hsl.includes('4 ')) return 'FF3B30';
  if (hsl.includes('34 ')) return 'FF9500';
  return '8E8E93';
}
